<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1929, 통학열차</title>
<style>
  :root{
    --ink:#16120d;          /* 깊은 먹색 배경 */
    --ink-2:#211b14;
    --paper:#efe6d1;        /* 옛 종이 */
    --paper-dim:#e3d7bd;
    --paper-edge:#c9b892;
    --text:#2b2318;         /* 종이 위 먹글씨 */
    --text-dim:#5a4c38;
    --seal:#a5372a;         /* 인주 붉은색 */
    --rail:#8a7a5c;
    --gauge-a:#b0512f;      /* 연대의식 */
    --gauge-b:#4f6b52;      /* 신변안전 */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--ink);
    background-image:radial-gradient(ellipse at 50% -10%, #2a2318 0%, var(--ink) 60%);
    color:var(--paper);
    font-family:'Batang','BatangChe','Nanum Myeongjo','Noto Serif KR',serif;
    line-height:1.75;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:20px 14px 90px;
  }
  .frame{width:100%;max-width:760px;}

  /* ── 상단: 제호 + 철로 진행표시 ───────────────── */
  header{ text-align:center; margin-bottom:14px; }
  .masthead{
    display:inline-block; letter-spacing:.45em; text-indent:.45em;
    font-size:.8rem; color:var(--paper-edge); border-top:1px solid var(--rail);
    border-bottom:1px solid var(--rail); padding:4px 10px; margin-bottom:8px;
  }
  h1.title{
    font-size:1.9rem; font-weight:700; letter-spacing:.12em; color:var(--paper);
  }
  h1.title .year{ color:var(--seal); }

  .railline{ position:relative; margin:20px auto 6px; max-width:560px; height:44px; }
  .railline .track{
    position:absolute; left:0; right:0; top:14px; height:0;
    border-top:2px solid var(--rail); border-bottom:1px solid #4a4030;
  }
  .station{ position:absolute; top:8px; width:14px; height:14px; border-radius:50%;
    background:var(--ink); border:2px solid var(--rail); transform:translateX(-50%); transition:background .4s,border-color .4s;}
  .station.passed{ background:var(--seal); border-color:var(--seal); }
  .station-label{ position:absolute; top:28px; transform:translateX(-50%);
    font-size:.68rem; letter-spacing:.1em; color:var(--paper-edge); white-space:nowrap;}
  .train{ position:absolute; top:2px; font-size:1rem; transform:translateX(-50%);
    transition:left .8s ease; }
  @media (prefers-reduced-motion: reduce){ .train{transition:none;} }

  /* ── 스탯 게이지 ───────────────── */
  .stats{ display:flex; gap:18px; justify-content:center; margin:10px 0 16px; flex-wrap:wrap;}
  .stat{ display:flex; align-items:center; gap:8px; font-size:.8rem; letter-spacing:.08em; color:var(--paper-dim);}
  .bar{ width:110px; height:9px; background:#0d0b08; border:1px solid #3d3527; }
  .bar > i{ display:block; height:100%; width:0%; transition:width .5s;}
  .bar.a > i{ background:var(--gauge-a);} .bar.b > i{ background:var(--gauge-b);}
  .stat .num{ min-width:1.4em; text-align:right; font-size:.8rem;}

  /* ── 본문 종이 ───────────────── */
  .paper{
    background:var(--paper);
    background-image:linear-gradient(180deg, rgba(255,255,255,.35), rgba(0,0,0,0) 30px),
                     repeating-linear-gradient(0deg, transparent 0 27px, rgba(90,70,40,.05) 27px 28px);
    color:var(--text);
    border:1px solid var(--paper-edge);
    box-shadow:0 10px 30px rgba(0,0,0,.55), inset 0 0 40px rgba(120,95,55,.12);
    padding:30px 30px 26px; position:relative;
    animation:fadein .5s ease;
  }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce){ .paper{animation:none;} }
  .paper::before{ /* 인주 도장 느낌 */
    content:attr(data-act); position:absolute; top:14px; right:16px;
    border:2px solid var(--seal); color:var(--seal); font-size:.72rem;
    letter-spacing:.2em; text-indent:.2em; padding:4px 7px; opacity:.85; border-radius:2px;
  }
  .scene-date{ font-size:.8rem; color:var(--text-dim); letter-spacing:.14em; margin-bottom:12px;}
  .scene-text p{ margin-bottom:1em; font-size:1.02rem; }
  .scene-text p:last-child{ margin-bottom:0; }
  .scene-text em{ font-style:normal; color:var(--seal); }

  .notice{ margin-top:14px; padding:10px 14px; border-left:3px solid var(--seal);
    background:rgba(165,55,42,.07); font-size:.88rem; color:var(--text-dim);}

  /* ── 선택지 ───────────────── */
  .choices{ margin-top:22px; display:flex; flex-direction:column; gap:10px; }
  .choices button{
    font-family:inherit; text-align:left; font-size:.98rem; line-height:1.5;
    background:var(--ink-2); color:var(--paper); border:1px solid var(--rail);
    padding:13px 16px; cursor:pointer; letter-spacing:.02em;
    transition:background .15s, border-color .15s;
  }
  .choices button:hover, .choices button:focus-visible{
    background:#2e261a; border-color:var(--seal); outline:none;
  }
  .choices button:focus-visible{ box-shadow:0 0 0 2px var(--seal); }
  .choices button .tag{ color:var(--paper-edge); font-size:.78rem; display:block; margin-top:3px;}

  /* ── 엔딩 ───────────────── */
  .ending-title{ font-size:1.3rem; letter-spacing:.1em; color:var(--seal); margin-bottom:10px;}
  .commentary{
    margin-top:20px; border-top:1px dashed var(--paper-edge); padding-top:16px;
  }
  .commentary h3{ font-size:.85rem; letter-spacing:.2em; color:var(--text-dim); margin-bottom:8px;}
  .commentary p{ font-size:.95rem; }
  .standards{ margin-top:14px; font-size:.78rem; color:var(--text-dim); line-height:1.6;}
  .standards b{ color:var(--seal); font-weight:400;}
  .restart{ margin-top:22px; }
  .restart button{
    font-family:inherit; font-size:.95rem; letter-spacing:.15em;
    background:var(--seal); color:var(--paper); border:none; padding:12px 26px; cursor:pointer;
  }
  .restart button:hover{ filter:brightness(1.1); }

  /* ── 인벤토리(하단 고정) ───────────────── */
  .inventory{
    position:fixed; left:0; right:0; bottom:0;
    background:rgba(13,11,8,.96); border-top:1px solid var(--rail);
    display:flex; align-items:center; gap:10px; padding:10px 16px; z-index:20;
    overflow-x:auto;
  }
  .inventory .label{ font-size:.72rem; letter-spacing:.2em; color:var(--paper-edge); flex-shrink:0;}
  .inv-item{
    font-family:inherit; font-size:.82rem; background:var(--ink-2); color:var(--paper-dim);
    border:1px solid var(--rail); padding:6px 12px; cursor:pointer; white-space:nowrap;
  }
  .inv-item:hover, .inv-item:focus-visible{ border-color:var(--seal); color:var(--paper); outline:none;}
  .inv-empty{ font-size:.78rem; color:#5c4e3a; }

  /* ── 사료 팝업 ───────────────── */
  .modal-back{
    position:fixed; inset:0; background:rgba(0,0,0,.65); display:none;
    align-items:center; justify-content:center; z-index:30; padding:20px;
  }
  .modal-back.open{ display:flex; }
  .modal{
    background:var(--paper); color:var(--text); max-width:480px; width:100%;
    border:1px solid var(--paper-edge); box-shadow:0 12px 40px rgba(0,0,0,.6);
    padding:26px 26px 20px; position:relative;
  }
  .modal h3{ font-size:1.05rem; color:var(--seal); margin-bottom:8px; letter-spacing:.06em;}
  .modal .kind{ font-size:.72rem; letter-spacing:.2em; color:var(--text-dim); margin-bottom:12px;}
  .modal p{ font-size:.92rem; }
  .modal .close{
    margin-top:16px; font-family:inherit; background:var(--ink-2); color:var(--paper);
    border:1px solid var(--rail); padding:8px 18px; cursor:pointer; font-size:.85rem;
  }
  .modal .close:hover{ border-color:var(--seal); }

  .toast{
    position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
    background:var(--seal); color:var(--paper); font-size:.85rem; letter-spacing:.05em;
    padding:9px 18px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:25;
  }
  .toast.show{ opacity:1; }

  @media (max-width:560px){
    .paper{ padding:24px 18px; }
    .station-label{ font-size:.6rem; }
    h1.title{ font-size:1.5rem; }
  }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="masthead">호외 · 광주발</div>
    <h1 class="title"><span class="year">1929</span>, 통학열차</h1>
    <div class="railline" aria-hidden="true">
      <div class="track"></div>
      <div class="station" style="left:6%"  id="st1"></div><div class="station-label" style="left:6%">제1막·목격</div>
      <div class="station" style="left:37%" id="st2"></div><div class="station-label" style="left:37%">제2막·조직</div>
      <div class="station" style="left:68%" id="st3"></div><div class="station-label" style="left:68%">제3막·확산</div>
      <div class="station" style="left:94%" id="st4"></div><div class="station-label" style="left:94%">제4막·결말</div>
      <div class="train" id="train" style="left:6%">🚂</div>
    </div>
    <div class="stats">
      <div class="stat">연대의식 <span class="bar a"><i id="gaugeSol"></i></span><span class="num" id="numSol">0</span></div>
      <div class="stat">신변안전 <span class="bar b"><i id="gaugeSaf"></i></span><span class="num" id="numSaf">0</span></div>
    </div>
  </header>

  <main class="paper" id="paper" data-act="第一幕">
    <div class="scene-date" id="sceneDate"></div>
    <div class="scene-text" id="sceneText"></div>
    <div id="noticeArea"></div>
    <div class="choices" id="choiceArea"></div>
    <div id="endingArea"></div>
  </main>
</div>

<div class="inventory" id="inventory">
  <span class="label">소지품</span>
  <span class="inv-empty" id="invEmpty">아직 아무것도 지니고 있지 않다.</span>
</div>

<div class="modal-back" id="modalBack" role="dialog" aria-modal="true">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="kind" id="modalKind"></div>
    <p id="modalBody"></p>
    <button class="close" onclick="closeModal()">덮어두기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────────
   상태
───────────────────────────────────────── */
const state = {
  solidarity: 0,   // 연대의식
  safety: 0,       // 신변안전
  items: [],
  act3Choice: null,
};
const MAXSTAT = 8;

/* ─────────────────────────────────────────
   아이템(사료 해설 포함)
───────────────────────────────────────── */
const ITEMS = {
  ticket: {
    name:"통학 승차권",
    kind:"실물 자료 · 철도 승차권",
    desc:"나주와 광주를 오가는 통학열차의 승차권. 당시 광주 인근의 조선인·일본인 학생들은 같은 열차로 통학했으나, 일본인 학생이 다니는 학교와 조선인 학생이 다니는 학교는 분리되어 있었고 차별적 시선과 마찰이 일상적으로 존재했다. 1929년 10월 30일 나주역에서 벌어진 일본인 학생의 조선인 여학생 희롱 사건은 이런 긴장이 폭발하는 도화선이 되었다."
  },
  seongjin: {
    name:"성진회 관련 문서",
    kind:"문헌 자료 · 비밀결사 기록",
    desc:"성진회(醒進會)는 1926년 광주 지역 학생들이 조직한 항일 비밀결사로, 이후 독서회 형태로 이어지며 학생들의 민족의식과 사회의식을 키우는 토대가 되었다. 광주학생항일운동이 우발적 충돌에 그치지 않고 조직적 시위로 발전할 수 있었던 배경에는 이러한 학생 조직의 오랜 준비가 있었다."
  },
  resolution: {
    name:"동맹휴학 결의문",
    kind:"문헌 자료 · 학생 운동 기록",
    desc:"동맹휴학(맹휴)은 학생들이 수업을 집단 거부하며 요구를 내걸던 일제강점기의 대표적 학생 운동 방식이었다. 1920년대 후반 전국에서 맹휴가 이어졌고, 학생들은 식민지 차별 교육 철폐와 한국인 본위의 교육을 요구했다. 광주학생항일운동 시기에도 맹휴는 시위와 함께 저항의 주요한 수단이었다."
  },
  manifesto: {
    name:"격문 사본",
    kind:"문헌 자료 · 시위 선전물",
    desc:"1929년 11월 광주의 학생들은 등사기로 격문을 인쇄해 배포하며 시위를 조직했다. 격문에는 검거된 학생의 석방과 식민지 차별 교육 철폐 등의 요구가 담겼다. 이러한 인쇄물은 소식을 빠르게 퍼뜨려 시위가 광주를 넘어 전국으로 확산되는 데 큰 역할을 했다."
  }
};

/* ─────────────────────────────────────────
   장면 데이터
───────────────────────────────────────── */
const SCENES = {
  /* ── 제1막 ── */
  s1: {
    act:1, seal:"第一幕", date:"1929년 10월 30일 · 나주역",
    text:[
      "수업을 마치고 올라탄 통학열차가 나주역에 멈춘다. 너는 광주고등보통학교에 다니는 조선인 학생이다. 개찰구를 빠져나가려는 순간, 앞쪽에서 소란이 인다.",
      "일본인 중학생 몇이 조선인 여학생의 댕기 머리를 잡아당기며 희롱하고 있다. 여학생의 얼굴이 굳어 있다. 주변의 조선인 학생들도 걸음을 멈추고 그 광경을 바라본다.",
      "순간, 열차 안팎의 공기가 팽팽해진다. <em>너는 어떻게 할 것인가.</em>"
    ],
    give:"ticket",
    choices:[
      { label:"바로 나서서 항의한다", tag:"연대의식 +2 · 신변안전 −1", sol:+2, saf:-1, next:"s2a" },
      { label:"일단 참고 넘어간다", tag:"신변안전 +2", sol:0, saf:+2, next:"s2b" },
      { label:"다른 조선인 학생들에게 먼저 알린다", tag:"연대의식 +1 · 신변안전 +1", sol:+1, saf:+1, next:"s2c" }
    ]
  },
  s2a: {
    act:1, seal:"第一幕", date:"같은 날 저녁 · 나주역 앞",
    text:[
      "\"그 손 놓지 못하겠는가!\" 네가 소리치자 일본인 학생들이 돌아본다. 실랑이 끝에 주먹이 오가고, 역전은 순식간에 아수라장이 된다. 달려온 순사는 다툼의 경위를 묻지도 않은 채 조선인 학생들만 다그친다.",
      "돌아오는 길, 함께 있던 동급생이 낮게 말한다. \"오늘 일, 여기서 끝나지 않을 걸세. 학교에서도 다들 알게 될 거야.\"",
      "네 가슴 속에서 무언가가 뜨겁게 일렁인다."
    ],
    choices:[ { label:"다음으로", tag:"", sol:0, saf:0, next:"s3" } ]
  },
  s2b: {
    act:1, seal:"第一幕", date:"같은 날 밤 · 하숙방",
    text:[
      "너는 시선을 내리깔고 개찰구를 빠져나왔다. 등 뒤에서 들리던 웃음소리가 하숙방까지 따라온 것만 같다.",
      "책상 앞에 앉아도 글자가 눈에 들어오지 않는다. 참는 것이 현명한 일이었을까, 아니면 비겁한 일이었을까.",
      "이튿날 학교에 가니 어제 일이 이미 파다하게 퍼져 있었다. 항의하다 얻어맞은 학생의 이름이 오르내리고, 교실마다 술렁임이 가라앉지 않는다."
    ],
    choices:[ { label:"다음으로", tag:"", sol:0, saf:0, next:"s3" } ]
  },
  s2c: {
    act:1, seal:"第一幕", date:"같은 날 저녁 · 통학열차 안",
    text:[
      "너는 조용히 뒤칸으로 가 낯익은 조선인 학생들에게 방금 본 것을 알린다. \"나주역에서, 우리 여학생이…\"",
      "말이 채 끝나기도 전에 몇몇이 자리를 박차고 일어난다. 실랑이가 벌어졌고, 너는 흩어지려는 학생들을 모아 다친 사람이 없는지 살폈다.",
      "그날 밤, 소문은 통학열차를 타고 광주 시내의 학교들로 번져 나갔다."
    ],
    choices:[ { label:"다음으로", tag:"", sol:0, saf:0, next:"s3" } ]
  },
  s3: {
    act:2, seal:"第二幕", date:"1929년 11월 초 · 광주고보 교실",
    text:[
      "나주역의 일은 하루하루 커져만 간다. 일본인 신문은 사건을 조선인 학생의 난동으로 몰아가고, 학교와 경찰은 조선인 학생들만 조사하려 든다.",

      "교실 밖 복도에서는 동맹휴학을 하자는 수군거림이 들려온다."
    ],
    choices:[
      { label:"동맹휴학에 동참한다", tag:"연대의식 +2", sol:+2, saf:0, next:"s4a" },
      { label:"시위 조직 회의에 참여한다", tag:"연대의식 +3 · 신변안전 −1", sol:+3, saf:-1, next:"s4b" },
      { label:"신중하게 지켜본다", tag:"신변안전 +2", sol:0, saf:+2, next:"s4c" }
    ]
  },
  s4a: {
    act:2, seal:"第二幕", date:"며칠 뒤 · 광주고보",

const STANDARDS_HTML =
  '<div class="standards">'
  + '<b>[10한사2-01-03]</b> 국내외에서 전개된 민족 운동의 흐름을 이해한다.<br>'
  + '<b>[10한사2-01-04]</b> 일제의 식민 통치로 인한 사회 및 문화의 변화와 대중운동의 양상을 파악한다.'
  + '<br><span style="opacity:.8">— 2022 개정 교육과정 · 고등학교 한국사2 (1) 일제 식민 통치와 민족운동</span></div>';

/* ─────────────────────────────────────────
   렌더링
───────────────────────────────────────── */
const $ = id => document.getElementById(id);

function updateStats(){
  const s = Math.max(0, Math.min(MAXSTAT, state.solidarity));
  const f = Math.max(0, Math.min(MAXSTAT, state.safety));
  $("gaugeSol").style.width = (s/MAXSTAT*100)+"%";
  $("gaugeSaf").style.width = (f/MAXSTAT*100)+"%";
  $("numSol").textContent = s;
  $("numSaf").textContent = f;
}

function updateRail(act){
  const pos = {1:"6%",2:"37%",3:"68%",4:"94%"};
  $("train").style.left = pos[act];
  [1,2,3,4].forEach(n=>{
    $("st"+n).classList.toggle("passed", n<=act);
  });
}

function giveItem(key){
  if(state.items.includes(key)) return;
  state.items.push(key);
  const inv = $("inventory");
  $("invEmpty").style.display = "none";
  const btn = document.createElement("button");
  btn.className = "inv-item";
  btn.textContent = "📜 " + ITEMS[key].name;
  btn.onclick = () => openModal(key);
  inv.appendChild(btn);
  showToast("소지품 획득 — " + ITEMS[key].name);
}

let toastTimer=null;
function showToast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

function openModal(key){
  $("modalTitle").textContent = ITEMS[key].name;
  $("modalKind").textContent = ITEMS[key].kind;
  $("modalBody").textContent = ITEMS[key].desc;
  $("modalBack").classList.add("open");
}
function closeModal(){ $("modalBack").classList.remove("open"); }
$("modalBack") && ($("modalBack").onclick = e=>{ if(e.target.id==="modalBack") closeModal(); });

function renderScene(key){
  const sc = SCENES[key];
  updateRail(sc.act);
  const paper = $("paper");
  paper.setAttribute("data-act", sc.seal);
  paper.style.animation = "none"; void paper.offsetWidth; paper.style.animation = "";
  $("sceneDate").textContent = sc.date;
  $("sceneText").innerHTML = sc.text.map(p=>"<p>"+p+"</p>").join("");
  $("noticeArea").innerHTML = "";
  $("endingArea").innerHTML = "";
  if(sc.give) giveItem(sc.give);

  const area = $("choiceArea");
  area.innerHTML = "";
  sc.choices.forEach(ch=>{
    const b = document.createElement("button");
    b.innerHTML = ch.label + (ch.tag ? '<span class="tag">'+ch.tag+'</span>' : "");
    b.onclick = ()=>{
      state.solidarity += ch.sol; state.safety += ch.saf;
      state.solidarity = Math.max(0, state.solidarity);
      state.safety = Math.max(0, state.safety);
      if(ch.mark) state.act3Choice = ch.mark;
      if(ch.give) giveItem(ch.give);
      updateStats();
      if(ch.next === "ENDING") renderEnding();
      else renderScene(ch.next);
      window.scrollTo({top:0, behavior:"smooth"});
    };
    area.appendChild(b);
  });
}

function pickEnding(){
  if(state.act3Choice === "escort" && state.solidarity >= 5) return "E3";
  if(state.solidarity >= 6) return "E1";
  if(state.solidarity >= 3) return "E2";
  return "E4";
}

function renderEnding(){
  const e = ENDINGS[pickEnding()];
  updateRail(4);
  const paper = $("paper");
  paper.setAttribute("data-act","第四幕");
  paper.style.animation = "none"; void paper.offsetWidth; paper.style.animation = "";
  $("sceneDate").textContent = "그 후";
  $("sceneText").innerHTML = '<div class="ending-title">'+e.title+'</div>'
    + e.text.map(p=>"<p>"+p+"</p>").join("");
  $("choiceArea").innerHTML = "";
  $("noticeArea").innerHTML = "";
  $("endingArea").innerHTML =
    '<div class="commentary"><h3>이 선택은 역사적으로 어떤 의미였는가</h3><p>'
    + e.commentary + '</p>' + STANDARDS_HTML + '</div>'
    + '<div class="restart"><button onclick="restart()">처음부터 다시 시작하기</button></div>';
}

function restart(){
  state.solidarity = 0; state.safety = 0; state.act3Choice = null; state.items = [];
  const inv = $("inventory");
  inv.querySelectorAll(".inv-item").forEach(n=>n.remove());
  $("invEmpty").style.display = "";
  updateStats();
  renderScene("s1");
  window.scrollTo({top:0});
}

/* 시작 */
updateStats();
renderScene("s1");
</script>
