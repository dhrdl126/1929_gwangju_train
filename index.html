<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1929, 통학열차 — 광주학생항일운동 대화형 역사 게임</title>
<style>
  :root{
    --ink:#16120d; --ink-2:#211b14;
    --paper:#efe6d1; --paper-dim:#e3d7bd; --paper-edge:#c9b892;
    --text:#2b2318; --text-dim:#5a4c38;
    --seal:#a5372a; --rail:#8a7a5c;
    --st1:#a5372a; /* 연대기 파악력 */
    --st2:#7a5a2e; /* 역사적 판단력 */
    --st3:#4f6b52; /* 비판적 사고  */
    --st4:#4a5a78; /* 역사적 탐구력 */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--ink);
    background-image:radial-gradient(ellipse at 50% -10%, #2a2318 0%, var(--ink) 60%);
    color:var(--paper);
    font-family:'Batang','BatangChe','Nanum Myeongjo','Noto Serif KR',serif;
    line-height:1.75; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:18px 12px 92px;
  }
  .frame{width:100%;max-width:780px;}
  header{text-align:center;margin-bottom:10px;}
  .masthead{display:inline-block;letter-spacing:.45em;text-indent:.45em;font-size:.78rem;
    color:var(--paper-edge);border-top:1px solid var(--rail);border-bottom:1px solid var(--rail);
    padding:3px 10px;margin-bottom:6px;}
  h1.title{font-size:1.8rem;font-weight:700;letter-spacing:.12em;}
  h1.title .year{color:var(--seal);}
  .subtitle{font-size:.75rem;color:var(--paper-edge);letter-spacing:.2em;margin-top:2px;}

  /* 철로 진행 */
  .railline{position:relative;margin:16px auto 4px;max-width:580px;height:44px;}
  .railline .track{position:absolute;left:0;right:0;top:14px;border-top:2px solid var(--rail);border-bottom:1px solid #4a4030;}
  .station{position:absolute;top:8px;width:14px;height:14px;border-radius:50%;background:var(--ink);
    border:2px solid var(--rail);transform:translateX(-50%);transition:.4s;}
  .station.passed{background:var(--seal);border-color:var(--seal);}
  .station-label{position:absolute;top:28px;transform:translateX(-50%);font-size:.66rem;
    letter-spacing:.08em;color:var(--paper-edge);white-space:nowrap;}
  .train{position:absolute;top:2px;font-size:1rem;transform:translateX(-50%);transition:left .8s ease;}
  @media (prefers-reduced-motion:reduce){.train{transition:none;}}

  /* 능력치 4종 */
  .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 22px;
    max-width:560px;margin:8px auto 14px;}
  .stat{display:flex;align-items:center;gap:8px;font-size:.74rem;letter-spacing:.04em;color:var(--paper-dim);}
  .stat .nm{width:6.2em;flex-shrink:0;text-align:right;}
  .bar{flex:1;height:8px;background:#0d0b08;border:1px solid #3d3527;}
  .bar>i{display:block;height:100%;width:0%;transition:width .5s;}
  #g1>i{background:var(--st1);} #g2>i{background:var(--st2);}
  #g3>i{background:var(--st3);} #g4>i{background:var(--st4);}
  .stat .num{min-width:1.3em;text-align:right;}

  /* 본문 종이 */
  .paper{background:var(--paper);
    background-image:linear-gradient(180deg,rgba(255,255,255,.35),rgba(0,0,0,0) 30px),
      repeating-linear-gradient(0deg,transparent 0 27px,rgba(90,70,40,.05) 27px 28px);
    color:var(--text);border:1px solid var(--paper-edge);
    box-shadow:0 10px 30px rgba(0,0,0,.55), inset 0 0 40px rgba(120,95,55,.12);
    padding:0 0 26px;position:relative;animation:fadein .5s ease;overflow:hidden;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.paper{animation:none;}}
  .paper::before{content:attr(data-act);position:absolute;top:12px;right:14px;z-index:5;
    border:2px solid var(--seal);color:var(--seal);font-size:.7rem;letter-spacing:.2em;
    text-indent:.2em;padding:3px 6px;opacity:.9;border-radius:2px;background:rgba(239,230,209,.85);}

  /* 상황 일러스트 배너 */
  .illust{width:100%;height:150px;display:block;border-bottom:1px solid var(--paper-edge);
    background:#20180f;}
  .illust svg{width:100%;height:100%;display:block;}

  .inner{padding:20px 28px 0;}
  .scene-date{font-size:.78rem;color:var(--text-dim);letter-spacing:.14em;margin-bottom:14px;}

  /* 대화 표시 */
  .dialog-line{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px;
    animation:lineIn .35s ease;}
  @keyframes lineIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.dialog-line{animation:none;}}
  .portrait{width:58px;height:58px;flex-shrink:0;border:1px solid var(--paper-edge);
    background:#e6dbc2;border-radius:3px;overflow:hidden;}
  .portrait svg{width:100%;height:100%;display:block;}
  .bubble{flex:1;}
  .speaker{font-size:.75rem;letter-spacing:.15em;color:var(--seal);margin-bottom:2px;}
  .bubble p{font-size:.98rem;}
  .dialog-line.narr{display:block;}
  .dialog-line.narr p{font-size:.95rem;color:var(--text-dim);padding-left:6px;
    border-left:3px solid var(--paper-edge);}
  .dialog-line.narr p em{font-style:normal;color:var(--seal);}

  .advance{margin-top:6px;text-align:right;}
  .advance button{font-family:inherit;font-size:.85rem;letter-spacing:.1em;
    background:none;border:none;color:var(--seal);cursor:pointer;padding:6px 10px;}
  .advance button:hover,.advance button:focus-visible{text-decoration:underline;outline:none;}

  /* 사료 탐구 버튼 */
  .explore-area{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
  .explore-btn{font-family:inherit;text-align:left;font-size:.85rem;
    background:rgba(74,90,120,.08);color:#3d4a63;border:1px dashed #7d8aa5;
    padding:9px 14px;cursor:pointer;}
  .explore-btn:hover,.explore-btn:focus-visible{background:rgba(74,90,120,.16);outline:none;}
  .explore-btn.done{opacity:.55;cursor:default;text-decoration:line-through;}
  .explore-btn .xtag{display:block;font-size:.72rem;color:#6b7690;margin-top:2px;}

  /* 선택지 */
  .choices{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
  .choices button{font-family:inherit;text-align:left;font-size:.96rem;line-height:1.5;
    background:var(--ink-2);color:var(--paper);border:1px solid var(--rail);
    padding:13px 16px;cursor:pointer;transition:.15s;}
  .choices button:hover,.choices button:focus-visible{background:#2e261a;border-color:var(--seal);outline:none;}
  .choices button:focus-visible{box-shadow:0 0 0 2px var(--seal);}
  .choices button .tag{color:var(--paper-edge);font-size:.76rem;display:block;margin-top:3px;}

  /* 엔딩 */
  .ending-title{font-size:1.3rem;letter-spacing:.1em;color:var(--seal);margin:4px 0 12px;}
  .commentary{margin-top:20px;border-top:1px dashed var(--paper-edge);padding-top:16px;}
  .commentary h3{font-size:.82rem;letter-spacing:.2em;color:var(--text-dim);margin-bottom:8px;}
  .commentary p{font-size:.94rem;margin-bottom:10px;}
  .lesson{margin-top:14px;background:rgba(165,55,42,.06);border-left:3px solid var(--seal);
    padding:12px 16px;}
  .lesson h3{font-size:.82rem;letter-spacing:.2em;color:var(--seal);margin-bottom:6px;}
  .lesson p{font-size:.93rem;}
  .standards{margin-top:14px;font-size:.76rem;color:var(--text-dim);line-height:1.65;}
  .standards b{color:var(--seal);font-weight:400;}
  .statreport{margin-top:14px;font-size:.82rem;color:var(--text-dim);}
  .statreport b{color:var(--text);font-weight:400;}
  .restart{margin-top:22px;}
  .restart button{font-family:inherit;font-size:.95rem;letter-spacing:.15em;
    background:var(--seal);color:var(--paper);border:none;padding:12px 26px;cursor:pointer;}
  .restart button:hover{filter:brightness(1.1);}

  /* 인벤토리 */
  .inventory{position:fixed;left:0;right:0;bottom:0;background:rgba(13,11,8,.96);
    border-top:1px solid var(--rail);display:flex;align-items:center;gap:10px;
    padding:10px 16px;z-index:20;overflow-x:auto;}
  .inventory .label{font-size:.7rem;letter-spacing:.2em;color:var(--paper-edge);flex-shrink:0;}
  .inv-item{font-family:inherit;font-size:.8rem;background:var(--ink-2);color:var(--paper-dim);
    border:1px solid var(--rail);padding:6px 12px;cursor:pointer;white-space:nowrap;}
  .inv-item:hover,.inv-item:focus-visible{border-color:var(--seal);color:var(--paper);outline:none;}
  .inv-empty{font-size:.76rem;color:#5c4e3a;}

  /* 사료 모달 */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;
    align-items:center;justify-content:center;z-index:30;padding:18px;}
  .modal-back.open{display:flex;}
  .modal{background:var(--paper);color:var(--text);max-width:520px;width:100%;
    border:1px solid var(--paper-edge);box-shadow:0 12px 40px rgba(0,0,0,.6);
    padding:26px 26px 20px;max-height:82vh;overflow-y:auto;}
  .modal h3{font-size:1.05rem;color:var(--seal);margin-bottom:6px;letter-spacing:.05em;}
  .modal .kind{font-size:.7rem;letter-spacing:.2em;color:var(--text-dim);margin-bottom:12px;}
  .modal .quote{background:rgba(90,70,40,.07);border-left:3px solid var(--paper-edge);
    padding:10px 14px;font-size:.9rem;margin-bottom:12px;}
  .modal p{font-size:.9rem;margin-bottom:8px;}
  .modal .src{font-size:.74rem;color:var(--text-dim);}
  .modal .close{margin-top:14px;font-family:inherit;background:var(--ink-2);color:var(--paper);
    border:1px solid var(--rail);padding:8px 18px;cursor:pointer;font-size:.85rem;}
  .modal .close:hover{border-color:var(--seal);}

  .toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);
    background:var(--seal);color:var(--paper);font-size:.84rem;letter-spacing:.04em;
    padding:9px 18px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:25;}
  .toast.show{opacity:1;}

  @media (max-width:600px){
    .inner{padding:16px 16px 0;}
    h1.title{font-size:1.45rem;}
    .stats{grid-template-columns:1fr;gap:5px;}
    .stat .nm{width:6.6em;}
    .station-label{font-size:.58rem;}
    .illust{height:110px;}
    .portrait{width:48px;height:48px;}
  }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="masthead">호외 · 광주발</div>
    <h1 class="title"><span class="year">1929</span>, 통학열차</h1>
    <div class="subtitle">광주학생항일운동 — 그날, 너의 선택</div>
    <div class="railline" aria-hidden="true">
      <div class="track"></div>
      <div class="station" style="left:6%"  id="st1"></div><div class="station-label" style="left:6%">제1막·목격</div>
      <div class="station" style="left:37%" id="st2"></div><div class="station-label" style="left:37%">제2막·조직</div>
      <div class="station" style="left:68%" id="st3"></div><div class="station-label" style="left:68%">제3막·확산</div>
      <div class="station" style="left:94%" id="st4"></div><div class="station-label" style="left:94%">제4막·결말</div>
      <div class="train" id="train" style="left:6%">🚂</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="nm">연대기 파악력</span><span class="bar" id="g1"><i></i></span><span class="num" id="n1">0</span></div>
      <div class="stat"><span class="nm">역사적 판단력</span><span class="bar" id="g2"><i></i></span><span class="num" id="n2">0</span></div>
      <div class="stat"><span class="nm">비판적 사고</span><span class="bar" id="g3"><i></i></span><span class="num" id="n3">0</span></div>
      <div class="stat"><span class="nm">역사적 탐구력</span><span class="bar" id="g4"><i></i></span><span class="num" id="n4">0</span></div>
    </div>
  </header>

  <main class="paper" id="paper" data-act="第一幕">
    <div class="illust" id="illust"></div>
    <div class="inner">
      <div class="scene-date" id="sceneDate"></div>
      <div id="dialogArea"></div>
      <div class="advance" id="advanceArea"></div>
      <div class="explore-area" id="exploreArea"></div>
      <div class="choices" id="choiceArea"></div>
      <div id="endingArea"></div>
    </div>
  </main>
</div>

<div class="inventory" id="inventory">
  <span class="label">수집한 사료</span>
  <span class="inv-empty" id="invEmpty">아직 수집한 사료가 없다. 장면 속 「사료 살펴보기」로 모을 수 있다.</span>
</div>

<div class="modal-back" id="modalBack" role="dialog" aria-modal="true">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="kind" id="modalKind"></div>
    <div class="quote" id="modalQuote" style="display:none"></div>
    <p id="modalBody"></p>
    <div class="src" id="modalSrc"></div>
    <button class="close" onclick="closeModal()">덮어두기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   인물 초상 (SVG)
═══════════════════════════════════════════ */

  police: P.face("#d9b48a", `

  jstudent: P.face("#dcb790", `

  girl:"이순덕 (여학생)", police:"순사", jstudent:"일본인 학생",

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
const ILLUST = {

  {sp:"narr", t:"너는 시선을 내리깔고 개찰구를 빠져나왔다. 그러나 눈만은 그 장면을 끝까지 좇았다. 여학생의 사촌 오빠 <em>박준채</em>가 달려들어 항의했고, 실랑이가 몸싸움으로 번졌으며, 순사는 조선인 학생들만 끌어냈다."},
  {sp:"player", t:"(참는 것이 현명한 일이었을까, 비겁한 일이었을까. …아니, 지금 중요한 건 그게 아니다. 나는 오늘, 처음부터 끝까지 보았다.)"},
  {sp:"narr", t:"하숙방에 돌아온 너는 등불 아래에서 오늘 본 것을 시간 순서대로 낱낱이 적어 내려간다. 누가 먼저 손을 댔는지. 순사가 누구만 잡아갔는지."},
  {sp:"friend", t:"(이튿날 아침) 자네 들었는가? 어제 나주역 일이 학교에 파다하네. 그런데 일본 신문은 우리 쪽이 먼저 난동을 부렸다고 썼다더군."},
  {sp:"player", t:"그건 사실과 다르네. 내가 그 자리에 있었어. 내가 적어 둔 것이 있네."},
 ],
 explore:[{doc:"press", label:"「사료 살펴보기」 같은 사건, 서로 다른 기사 — 보도 통제의 실상", gain:{q:1,r:1}}],
 choices:[
  {label:"기록을 벗들에게 보여 주며 신문 보도의 왜곡을 조목조목 짚는다", tag:"비판적 사고 +2 · 역사적 탐구력 +1", g:{r:2,q:1}, next:"s3"},
  {label:"기록은 간직하되, 사태가 어디로 흐르는지 더 지켜본다", tag:"역사적 탐구력 +1", g:{q:1}, next:"s3"},
 ]},

s2c:{ act:1, seal:"第一幕", date:"같은 날 저녁 · 통학열차 안", illust:"train",
 lines:[
  {sp:"player", t:"(뒤칸으로 달려가며) 나주역에서 지금, 우리 여학생이 봉변을 당하고 있네!"},
  {sp:"narr", t:"말이 끝나기도 전에 몇몇이 자리를 박차고 일어난다. 그 사이 앞쪽에서는 여학생의 사촌 오빠 <em>박준채</em>가 이미 항의에 나서 몸싸움이 벌어지고 있었다."},
  {sp:"girl", t:"…고맙습니다. 와 주셔서. 저는 괜찮습니다. 그런데 저들은 늘 이래 왔어요. 오늘이 처음이 아니에요."},
  {sp:"player", t:"알고 있습니다. 오늘이 처음이 아니라는 것. 그래서 더는 그냥 넘어가서는 안 된다는 것도."},
  {sp:"narr", t:"너는 흩어지려는 학생들을 모아 다친 사람이 없는지 살피고, 각자 본 것을 서로 맞추어 두게 했다. 그날 밤, 소문은 통학열차를 타고 광주 시내의 학교들로 번져 나갔다."},
 ],
 choices:[
  {label:"목격자들의 이야기를 모아 사건의 전말을 정리해 둔다", tag:"역사적 탐구력 +2", g:{q:2}, next:"s3"},
  {label:"내일부터 각 학교 벗들에게 연락할 방도를 궁리한다", tag:"역사적 판단력 +2", g:{j:2}, next:"s3"},
 ]},

s3:{ act:2, seal:"第二幕", date:"1929년 11월 초 · 광주고보 교실", illust:"classroom",
 lines:[
  {sp:"narr", t:"나주역의 일은 하루하루 커져만 간다. 일본인 신문은 사건을 조선인 학생의 난동으로 몰아가고, 학교와 경찰은 조선인 학생들만 조사하려 든다."},
  {sp:"friend", t:"어제도 3학년 둘이 불려 갔다더군. 저쪽 학생들은 멀쩡히 등교하는데 말일세."},
  {sp:"senior", t:"(다가와 목소리를 낮추며) 자네가 요즘 벗들 사이에서 이야기가 되더군. 오늘 밤 독서회 모임이 있네. 이대로 있을 수는 없다는 이야기가 나오고 있어."},
  {sp:"player", t:"독서회라면… 성진회에서 이어져 온 그 모임 말입니까."},
  {sp:"senior", t:"쉿. 이름은 함부로 입에 담지 말게. 다만 하나만 묻지. 자네는 이 일을 <em>어쩌다 터진 싸움</em>이라 보는가, 아니면 <em>오래 쌓인 것이 터져 나온 것</em>이라 보는가."},
 ],
 explore:[{doc:"seongjin", label:"「사료 살펴보기」 성진회와 독서회 — 운동은 하루아침에 만들어지지 않았다", gain:{q:1,c:1}}],
 choices:[
  {label:"\"오래 쌓인 차별이 터진 것입니다. 3·1운동, 6·10만세운동, 그리고 지금까지 흐름은 이어져 왔습니다.\"", tag:"연대기 파악력 +2 · 비판적 사고 +1", g:{c:2,r:1}, next:"s4b"},
  {label:"수업 거부, 동맹휴학에 동참하겠다고 답한다", tag:"역사적 판단력 +1", g:{j:1}, next:"s4a"},
  {label:"아직은 신중하게, 조금 더 지켜보겠다고 답한다", tag:"역사적 탐구력 +1", g:{q:1}, next:"s4c"},
 ]},

s4a:{ act:2, seal:"第二幕", date:"며칠 뒤 · 광주고보 운동장", illust:"classroom",
 lines:[
  {sp:"narr", t:"너는 결의문에 이름을 올렸다. 등교는 하되 수업은 거부한다. 텅 빈 필기장 위에 놓인 것은 차별 교육 철폐를 요구하는 결의문 한 장이다."},
  {sp:"police", t:"주동자가 누구냐. 순순히 대면 나머지는 관대히 처분하겠다."},
  {sp:"narr", t:"교사들과 형사들이 으름장을 놓지만, 학생들은 흩어지지 않는다. 조회 시간, 운동장에 늘어선 학생들의 침묵이 어떤 함성보다 크게 느껴진다."},
  {sp:"friend", t:"우리 요구가 무엇인지는 분명히 해 두어야 하네. 그저 화가 나서가 아니라는 걸 보여 줘야 해."},
 ],
 explore:[{doc:"resolution", label:"「사료 살펴보기」 동맹휴학 — 학생들은 무엇을 요구했나", gain:{q:1}}],
 choices:[
  {label:"요구 조건을 문서로 정리하는 일을 맡는다 (조선인 본위 교육·차별 철폐)", tag:"비판적 사고 +2", g:{r:2}, next:"s5"},
  {label:"각 반의 결의를 하나로 모으는 연락을 맡는다", tag:"역사적 판단력 +2", g:{j:2}, next:"s5"},
 ]},

s4b:{ act:2, seal:"第二幕", date:"며칠 뒤 밤 · 시내 어느 집", illust:"night",
 lines:[
  {sp:"senior", t:"잘 보았네. 나주역은 도화선일 뿐, 화약은 오래전부터 쌓여 있었지. 그래서 우리가 몇 해를 두고 준비해 온 걸세."},
  {sp:"narr", t:"등불 하나를 가운데 두고 학생들이 둘러앉았다. 성진회에서 이어져 온 독서회의 선배들이다. 낡은 문서와 책들이 방 한쪽에 쌓여 있다."},
  {sp:"senior", t:"흩어져 싸우면 각개격파당할 뿐이다. 날을 정해 함께 움직여야 하네. 11월 3일 — 저들의 명절이자, 마침 일요일. 시내에 학생들이 모두 나오는 날이지."},
  {sp:"player", t:"(날짜 하나에도 이렇게 셈이 들어 있구나. 운동은 감정이 아니라 계획으로 움직이는 것인가.)"},
  {sp:"narr", t:"격론 끝에 계획이 서고, 너는 학교 간 연락을 맡기로 했다. 돌아 나오는 골목, 순사의 호각 소리에 심장이 내려앉았지만 품속의 문서는 무사했다."},
 ],
 explore:[{doc:"seongjin", label:"「사료 살펴보기」 성진회와 독서회 — 조직은 어떻게 준비되었나", gain:{q:1,c:1}}],
 choices:[
  {label:"각 학교 독서회를 잇는 연락망을 머릿속에 그려 둔다", tag:"역사적 판단력 +2 · 연대기 파악력 +1", g:{j:2,c:1}, next:"s5", flag:"meeting"},
  {label:"만일 검거될 경우를 대비해 문서 은닉과 암호를 정해 두자고 제안한다", tag:"역사적 판단력 +1 · 비판적 사고 +1", g:{j:1,r:1}, next:"s5", flag:"meeting"},
 ]},

s4c:{ act:2, seal:"第二幕", date:"며칠 뒤 · 광주고보", illust:"classroom",
 lines:[
  {sp:"player", t:"(선뜻 나서지 못했다. 고향의 부모님 얼굴이 눈앞을 스친다. 퇴학이라도 당하면, 투옥이라도 되면 집안은 어찌 되는가.)"},
  {sp:"narr", t:"그러나 지켜보는 일도 마음 편치는 않다. 결의문이 돌고, 밤 모임의 소식이 들려올 때마다 너는 자꾸만 창밖을 내다보게 된다."},
  {sp:"friend", t:"자네를 탓하는 게 아닐세. 다만 하나만 부탁하지. 무슨 일이 벌어지는지, 자네만큼은 <em>똑똑히 보고 기억해 주게.</em> 훗날 누군가는 증언해야 할 테니."},
  {sp:"player", t:"…그건 약속하겠네. 내 눈으로 본 것은, 반드시."},
  {sp:"narr", t:"그리고 11월 3일이 밝았다."},
 ],
 choices:[
  {label:"수첩을 챙겨 시내로 나간다 — 기록자가 되기로 한다", tag:"역사적 탐구력 +2", g:{q:2}, next:"s5"},
  {label:"불안한 마음으로, 그러나 벗들 곁에 있기 위해 시내로 나간다", tag:"역사적 판단력 +1", g:{j:1}, next:"s5"},
 ]},

s5:{ act:3, seal:"第三幕", date:"1929년 11월 3일 · 광주 시내", illust:"street",
 lines:[
  {sp:"narr", t:"일요일이자 일제의 명절인 이날, 광주 시내에서 조선인 학생과 일본인 학생의 충돌이 다시 불붙었다. 소식은 삽시간에 각 학교로 퍼졌고, 학생들이 거리로 쏟아져 나오기 시작한다."},
  {sp:"narr", t:"\"검거된 학우를 석방하라!\" \"식민지 차별 교육 철폐하라!\" 함성이 광주 거리를 뒤흔든다."},
  {sp:"senior", t:"대열 뒤편에 등사기를 차렸네. 격문을 찍어 시내에, 그리고 다른 고장으로 보낼 걸세. 손이 모자라!"},
  {sp:"friend", t:"저기 골목을 보게. 어린 후배들이 겁에 질려 오도 가도 못하고 있어. 순사대가 이쪽으로 오고 있는데…"},
  {sp:"narr", t:"<em>이 거대한 물결 속에서, 너는 어떤 자리에 설 것인가.</em>"},
 ],
 explore:[{doc:"manifesto", label:"「사료 살펴보기」 격문 — 학생들은 무엇을 외쳤나", gain:{q:1}}],
 choices:[
  {label:"대열에 뛰어들어 함께 행진한다", tag:"역사적 판단력 +2", g:{j:2}, next:"s6", mark:"street"},
  {label:"등사기 앞에 앉아 격문 제작과 배포를 맡는다", tag:"비판적 사고 +2 · 역사적 탐구력 +1", g:{r:2,q:1}, next:"s6", mark:"print", give:"manifesto"},
  {label:"골목으로 달려가 후배들을 피신시킨다", tag:"역사적 판단력 +2 · 역사적 탐구력 +1", g:{j:2,q:1}, next:"s6", mark:"escort"},
  {label:"(독서회 참여자만) 연락책으로서 대열 사이를 오가며 각 학교의 합류를 지휘한다", tag:"역사적 판단력 +2 · 연대기 파악력 +1", g:{j:2,c:1}, next:"s6", mark:"lead", need:"meeting"},
 ]},

s6:{ act:3, seal:"第三幕", date:"1929년 11월 ~ 12월 · 광주, 그리고 전국", illust:"nation",
 lines:[
  {sp:"narr", t:"광주의 함성은 광주에서 멈추지 않았다. 목포로, 나주로, 서울로 — 소식과 격문이 퍼져 나가면서 전국 각지의 학교가 시위와 동맹휴학으로 응답하기 시작했다."},
  {sp:"senior", t:"신간회에서 조사단이 내려왔네. 우리 일을 전국에 알리는 민중대회를 연다는 이야기도 있어. 이제 이건 광주만의 일이 아닐세."},
  {sp:"friend", t:"그런데 자네, 지금까지의 일이 머릿속에 정리가 되는가? 나는 어지럽네. 대체 무엇이 먼저고 무엇이 나중이었는지."},
  {sp:"player", t:"짚어 보세. 순서가 곧 인과일세. 이 운동이 어떻게 커졌는지는 순서 속에 답이 있어."},
 ],
 explore:[
  {doc:"spread", label:"「사료 살펴보기」 전국 확산의 기록 — 몇 개 학교, 몇 명이 함께했나", gain:{q:1,c:1}},
  {doc:"singanhoe", label:"「사료 살펴보기」 신간회의 지원 — 학생 운동은 어떻게 민족 운동이 되었나", gain:{q:1}},
 ],
 choices:[
  {label:"\"나주역 충돌 → 학내 조사와 맹휴 → 11·3 광주 시위 → 전국 확산. 이 순서일세.\"", tag:"연대기 파악력 +3 (정확한 흐름)", g:{c:3}, next:"s7"},
  {label:"\"11·3 시위가 먼저고, 나주역 일은 그 뒤에 알려진 것 아니었나?\"", tag:"연대기 파악력 +1 (명석이 바로잡아 준다)", g:{c:1}, next:"s7"},
 ]},

s7:{ act:3, seal:"第三幕", date:"1929년 12월 · 검거의 계절", illust:"dawn",
 lines:[
  {sp:"narr", t:"확산되는 만큼 탄압도 매서워졌다. 신간회의 민중대회는 사전에 탄압당해 간부들이 검거되었고, 학교 안까지 검거의 손길이 뻗쳐 온다. 함께했던 얼굴들이 하나둘 보이지 않는다."},
  {sp:"senior", t:"(쫓기듯 찾아와) 부탁이 하나 있네. 광주의 소식을 정리한 문서일세. 이것을 경성의 학생들에게 전해 줄 사람이 필요해. 위험한 일이야. 발각되면… 자네도 알겠지."},
  {sp:"player", t:"(품에 안긴 문서 꾸러미가 천근처럼 무겁다. 가면 잡힐 수도 있다. 그러나 이 기록이 닿지 않으면, 광주의 일은 광주에서 끝난다.)"},
 ],
 choices:[
  {label:"문서를 품고 경성행 열차에 오른다", tag:"역사적 판단력 +2 · 위험을 감수한다", g:{j:2}, next:"ENDING", flag:"courier"},
  {label:"자신은 남되, 더 안전한 전달 방도를 함께 궁리한다", tag:"비판적 사고 +1", g:{r:1}, next:"ENDING"},
 ]},
};

E5:{ title:"엔딩 · 경성으로 간 격문", illust:"nation",
 text:[
  "너는 문서를 교과서 갈피에 숨기고 경성행 열차에 올랐다. 검문의 순간마다 심장이 얼어붙었지만, 네가 지난 몇 달간 몸으로 익힌 것들 — 사건의 순서, 저들의 논리, 기록의 힘 — 이 너를 침착하게 만들었다.",
  "광주의 소식은 경성의 학교들에 닿았다. 이듬해 봄까지 전국의 학교가 궐기했고, 시위와 맹휴의 물결은 바다 건너 한인 학교로까지 이어졌다. 훗날 너는 알게 된다. 그 겨울 네가 나른 것은 종이 몇 장이 아니라, 하나의 불씨였다는 것을."],
 commentary:"광주학생항일운동은 광주에 머물지 않고 서울과 전국, 나아가 만주·일본의 한인 사회로 확산되었다. 소식과 격문을 나른 무명의 학생 연락자들, 그리고 신간회를 비롯한 사회단체의 지원이 이 확산을 가능하게 했다. 190여 개교, 5만여 명이 참여한 이 운동은 3·1운동 이후 최대 규모의 항일 민족 운동으로 평가된다.",
 lesson:"역사는 이름이 남은 몇 사람만으로 움직이지 않는다. 기록하고, 전하고, 잇는 사람들 — 역사의 '연결자'들이 있었기에 한 도시의 함성은 민족의 함성이 될 수 있었다. 오늘 우리가 접하는 수많은 소식 앞에서, 무엇을 확인하고 무엇을 전할 것인가는 여전히 우리 각자의 선택으로 남아 있다." },
E1:{ title:"엔딩 · 겨울을 건너는 사람", illust:"dawn",
 text:[
  "새벽, 하숙방 문을 두드린 것은 형사들이었다. 너는 퇴학 처분을 받고 옥고를 치렀다. 차가운 감방에서 보낸 겨울 — 그러나 너는 혼자가 아니었다. 전국에서 잡혀 온 학생들의 이야기가 벽을 타고 전해졌다.",
  "출옥한 뒤 학교로 돌아갈 수는 없었다. 그러나 너를 찾아온 것은 신간회에서 활동하는 어른들이었다. \"자네 같은 젊은이가 필요하네.\" 너의 싸움은 교문 밖에서 다시 시작되었다."],
 commentary:"광주학생항일운동으로 수많은 학생이 퇴학·구속되었으나, 이들 중 상당수는 이후에도 청년 운동과 사회 운동에 투신하며 민족 운동의 흐름을 이어갔다. 학생들의 저항은 일회적 사건이 아니라 3·1운동 — 6·10만세운동 — 광주학생항일운동으로 이어지는 항일 운동사의 큰 흐름 위에 있었다.",
 lesson:"부당함 앞에서 목소리를 내는 데에는 대가가 따랐다. 그러나 그 대가를 감수한 이들이 있었기에 다음 세대는 더 넓은 길을 걸을 수 있었다. '나 하나쯤'이 아니라 '나부터'라고 생각한 사람들이 역사의 물줄기를 바꾸어 왔음을 이 운동은 보여 준다." },
E3:{ title:"엔딩 · 마지막까지 골목에 남은 사람", illust:"dawn",
 text:[
  "그날 너는 시위 대열 대신 골목을 지켰다. 겁에 질린 후배들을 하나하나 집으로 돌려보내고, 쫓기는 학우를 헛간에 숨겼다. 그리고 마지막 한 명을 피신시키던 길목에서 너는 붙잡혔다.",
  "취조실에서 이름을 대라는 추궁이 이어졌지만 너는 끝내 입을 열지 않았다. 옥고는 길고 혹독했다. 그러나 훗날 무사히 학업을 마친 후배가 면회를 와 고개를 숙였을 때, 너는 그 겨울의 선택을 후회하지 않았다."],
 commentary:"운동의 역사에는 대열의 맨 앞에 선 사람만 있는 것이 아니다. 동료를 숨기고, 연락을 잇고, 검거의 위험을 대신 짊어진 이들의 이름 없는 헌신이 있었기에 조직은 무너지지 않고 이어질 수 있었다. 일제의 취조 속에서도 동지를 지킨 학생들의 이야기는 여러 기록과 회고를 통해 전해진다.",
 lesson:"공동체를 지키는 방식은 하나가 아니다. 앞에서 외치는 용기와 뒤에서 지키는 용기는 서로를 필요로 한다. 역사를 배울 때 우리는 '가장 큰 목소리'만이 아니라 '가장 낮은 자리의 헌신'까지 읽어 낼 수 있어야 한다." },
E2:{ title:"엔딩 · 남겨진 자의 숙제", illust:"classroom",
 text:[
  "너는 무기정학 처분을 받았다. 주동자로 지목되지는 않았으나, 결의에 이름을 올린 대가였다. 학교에서 쫓겨난 벗들의 빈자리를 볼 때마다 가슴 한구석이 저릿하다.",
  "이듬해 복학한 너는 예전처럼 웃지 못했다. 다만 그해 겨울 모아 둔 기록들을 다시 꺼내 정리했고, 후배들이 물어올 때면 낮은 목소리로 들려주었다. 기억하고 증언하는 일 — 그것이 남겨진 너의 숙제였다."],
 commentary:"광주학생항일운동에 참여한 학생들은 퇴학·정학 등 무거운 징계를 받았고, 그 상처는 개인의 삶에 오래 남았다. 그러나 처벌로 운동의 기억까지 지울 수는 없었다. 참여자들의 경험과 기억, 그리고 남겨진 기록들은 이후 세대에게 전해지며 일제강점기 학생 운동사의 토대가 되었다.",
 lesson:"역사는 승리의 기록만이 아니라 상처와 기억의 기록이기도 하다. 겪은 것을 정확히 기억하고 다음 세대에 증언하는 일은, 거리에 서는 일 못지않게 중요한 역사적 실천이다. 오늘의 우리가 이 운동을 배울 수 있는 것도 누군가 기억하고 기록했기 때문이다." },
E4:{ title:"엔딩 · 뒤늦게 닿은 함성", illust:"nation",
 text:[
  "새벽의 노크는 이웃집을 향한 것이었다. 너는 끝내 대열의 한가운데에 서지 않았고, 무사히 졸업장을 받았다. 오랫동안 너는 그해 겨울을 애써 떠올리지 않았다.",
  "세월이 흘러 어느 날, 너는 그해의 시위가 광주를 넘어 전국 190여 개 학교로 번진 거대한 항일 운동이었음을 되짚게 되었다. 네가 목격했던 나주역의 그 순간이 씨앗이었다. 너는 자식들에게 처음으로 그날의 이야기를 꺼냈다. \"나는 그때 그 자리에 있었다. 그리고 이제야 말한다.\""],
 commentary:"광주학생항일운동은 1929년 11월 광주에서 시작되어 이듬해까지 전국 수많은 학교와 학생들이 참여한, 3·1운동 이후 최대 규모의 항일 민족 운동으로 평가된다. 직접 대열에 서지 못한 이들에게도 이 운동은 오랜 물음을 남겼으며, 그 기억을 증언하고 기록하는 일 또한 역사를 잇는 하나의 방식이 되었다.",
 lesson:"역사적 순간은 늘 '한가운데'에서만 경험되는 것이 아니다. 방관과 참여 사이에서 흔들렸던 수많은 보통 사람들의 마음까지 헤아릴 때, 우리는 과거를 더 정직하게 이해할 수 있다. 그리고 그 이해는 '나라면 어떻게 했을까'라는, 역사가 오늘의 우리에게 던지는 질문으로 이어진다." },
};

const STANDARDS_HTML =
  '<div class="standards">'
  + '<b>[10한사2-01-03]</b> 국내외에서 전개된 민족 운동의 흐름을 이해한다.<br>'
  + '<b>[10한사2-01-04]</b> 일제의 식민 통치로 인한 사회 및 문화의 변화와 대중운동의 양상을 파악한다.'
  + '<br><span style="opacity:.8">— 2022 개정 교육과정 · 고등학교 한국사2 (1) 일제 식민 통치와 민족운동</span></div>';

/* ═══════════════════════════════════════════
   엔진
═══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const MAXSTAT = 12;
const state = { c:0, j:0, r:0, q:0, items:[], mark:null, flags:{}, readDocs:{} };
let cur = null, lineIdx = 0;

function updateStats(){
  [["c","g1","n1"],["j","g2","n2"],["r","g3","n3"],["q","g4","n4"]].forEach(([k,g,n])=>{
    const v = Math.max(0, Math.min(MAXSTAT, state[k]));
    $(g).firstElementChild.style.width = (v/MAXSTAT*100)+"%";
    $(n).textContent = v;
  });
}
function gain(g){
  if(!g) return;
  const nm = {c:"연대기 파악력", j:"역사적 판단력", r:"비판적 사고", q:"역사적 탐구력"};
  const parts = [];
  for(const k in g){ state[k]+=g[k]; parts.push(nm[k]+" +"+g[k]); }
  updateStats();
  if(parts.length) showToast(parts.join(" · "));
}
function updateRail(act){
  const pos = {1:"6%",2:"37%",3:"68%",4:"94%"};
  $("train").style.left = pos[act];
  [1,2,3,4].forEach(n=>$("st"+n).classList.toggle("passed", n<=act));
}
let toastTimer=null;
function showToast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
}
function addToInventory(key){
  if(state.items.includes(key)) return;
  state.items.push(key);
  $("invEmpty").style.display="none";
  const btn=document.createElement("button");
  btn.className="inv-item"; btn.textContent="📜 "+SOURCES[key].name;
  btn.onclick=()=>openModal(key);
  $("inventory").appendChild(btn);
}
function openModal(key){
  const s=SOURCES[key];
  $("modalTitle").textContent=s.name;
  $("modalKind").textContent=s.kind;
  const q=$("modalQuote");
  if(s.quote){ q.style.display=""; q.textContent=s.quote; } else q.style.display="none";
  $("modalBody").textContent=s.desc;
  $("modalSrc").textContent="※ "+s.src;
  $("modalBack").classList.add("open");
}
function closeModal(){ $("modalBack").classList.remove("open"); }
$("modalBack").onclick=e=>{ if(e.target.id==="modalBack") closeModal(); };

function lineHTML(l){
  if(l.sp==="narr")
    return '<div class="dialog-line narr"><p>'+l.t+'</p></div>';
  return '<div class="dialog-line"><div class="portrait">'+PORTRAITS[l.sp]+'</div>'
    +'<div class="bubble"><div class="speaker">'+NAMES[l.sp]+'</div><p>'+l.t+'</p></div></div>';
}

function renderScene(key){
  cur=SCENES[key]; lineIdx=0;
  updateRail(cur.act);
  const paper=$("paper");
  paper.setAttribute("data-act",cur.seal);
  paper.style.animation="none"; void paper.offsetWidth; paper.style.animation="";
  $("illust").innerHTML=ILLUST[cur.illust]||"";
  $("sceneDate").textContent=cur.date;
  $("dialogArea").innerHTML="";
  $("exploreArea").innerHTML="";
  $("choiceArea").innerHTML="";
  $("endingArea").innerHTML="";
  showNextLine();
  window.scrollTo({top:0,behavior:"smooth"});
}

function showNextLine(){
  const area=$("dialogArea");
  area.insertAdjacentHTML("beforeend", lineHTML(cur.lines[lineIdx]));
  lineIdx++;
  const adv=$("advanceArea");
  if(lineIdx < cur.lines.length){
    adv.innerHTML='<button onclick="showNextLine()">▶ 계속</button>';
  } else {
    adv.innerHTML="";
    renderExplore();
    renderChoices();
  }
}

function renderExplore(){
  const area=$("exploreArea");
  (cur.explore||[]).forEach(ex=>{
    const b=document.createElement("button");
    b.className="explore-btn"+(state.readDocs[ex.doc]?" done":"");
    const tag = state.readDocs[ex.doc] ? "이미 살펴본 사료" : "역사적 탐구력 상승 · 사료가 수집됨";
    b.innerHTML=ex.label+'<span class="xtag">'+tag+'</span>';
    b.onclick=()=>{
      openModal(ex.doc);
      if(!state.readDocs[ex.doc]){
        state.readDocs[ex.doc]=true;
        addToInventory(ex.doc);
        gain(ex.gain);
        b.classList.add("done");
        b.querySelector(".xtag").textContent="이미 살펴본 사료";
      }
    };
    area.appendChild(b);
  });
}

function renderChoices(){
  const area=$("choiceArea");
  cur.choices.forEach(ch=>{
    if(ch.need && !state.flags[ch.need]) return;
    const b=document.createElement("button");
    b.innerHTML=ch.label+(ch.tag?'<span class="tag">'+ch.tag+'</span>':"");
    b.onclick=()=>{
      gain(ch.g);
      if(ch.mark) state.mark=ch.mark;
      if(ch.flag) state.flags[ch.flag]=true;
      if(ch.give) addToInventory(ch.give);
      if(ch.next==="ENDING") renderEnding();
      else renderScene(ch.next);
    };
    area.appendChild(b);
  });
}

function pickEnding(){
  const total = state.c+state.j+state.r+state.q;
  if(state.flags.courier && (state.j+state.r)>=7) return "E5";
  if(state.mark==="escort" && total>=12) return "E3";
  if((state.mark==="street"||state.mark==="lead") && total>=13) return "E1";
  if(total>=9) return "E2";
  return "E4";
}

function statReport(){
  const nm={c:"연대기 파악력",j:"역사적 판단력",r:"비판적 사고",q:"역사적 탐구력"};
  let best="c";
  ["j","r","q"].forEach(k=>{ if(state[k]>state[best]) best=k; });
  const msg={
    c:"사건과 사건의 순서, 그 인과의 사슬을 꿰는 데 강했다.",
    j:"각 국면에서 상황을 저울질하며 결단하는 힘이 돋보였다.",
    r:"기록과 보도를 그대로 믿지 않고 따져 묻는 눈이 예리했다.",
    q:"사료를 찾아 읽고 모으는 탐구의 발걸음이 부지런했다.",
  };
  return '<div class="statreport">이번 여정에서 가장 크게 자란 힘 — <b>'+nm[best]+'</b>. '
    + msg[best]+' (연대기 '+state.c+' · 판단 '+state.j+' · 비판 '+state.r+' · 탐구 '+state.q
    + ' / 수집한 사료 '+state.items.length+'점)</div>';
}

function renderEnding(){
  const e=ENDINGS[pickEnding()];
  updateRail(4);
  const paper=$("paper");
  paper.setAttribute("data-act","第四幕");
  paper.style.animation="none"; void paper.offsetWidth; paper.style.animation="";
  $("illust").innerHTML=ILLUST[e.illust]||"";
  $("sceneDate").textContent="그 후";
  $("dialogArea").innerHTML='<div class="ending-title">'+e.title+'</div>'
    + e.text.map(p=>'<div class="dialog-line narr"><p style="border-left:none;padding-left:0;color:var(--text)">'+p+'</p></div>').join("");
  $("advanceArea").innerHTML="";
  $("exploreArea").innerHTML="";
  $("choiceArea").innerHTML="";
  $("endingArea").innerHTML=
    '<div class="commentary"><h3>이 선택은 역사적으로 어떤 의미였는가</h3><p>'+e.commentary+'</p></div>'
    +'<div class="lesson"><h3>역사적 교훈 — 오늘의 우리에게</h3><p>'+e.lesson+'</p></div>'
    + statReport() + STANDARDS_HTML
    +'<div class="restart"><button onclick="restart()">처음부터 다시 시작하기</button></div>';
  window.scrollTo({top:0,behavior:"smooth"});
}

function restart(){
  state.c=0; state.j=0; state.r=0; state.q=0;
  state.items=[]; state.mark=null; state.flags={}; state.readDocs={};
  document.querySelectorAll(".inv-item").forEach(n=>n.remove());
  $("invEmpty").style.display="";
  updateStats();
  renderScene("s1");
}

/* 시작 */
updateStats();
renderScene("s1");
</script>
</body>
</html>
